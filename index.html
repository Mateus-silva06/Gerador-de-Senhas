<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Gerador-de-Senha.ico" type="image/x-icon">
    <title>Gerador de Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img class="logo" src="geradorLogo.png" alt="geradar de senha">

    <main class="container-input">
        <span>Tamanho <span id="valor"></span> caracteres</span>
        <input id="slider" class="slider" type="range" min="5" max="25" value="8">

        <button id="botao" class="botao-c" onclick="geradorsenha()">Gerar senha</button>

        <div id="container-senha" onclick="copiasenha()" class="container-senha hide">
            <span class="titulo">Sua senha gerada foi:</span>
            <span id="senha" class="senha" ></span>
            <span class="copy">Clique para copiar. </span>

        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
